---
services:
  chrome:
    image: lscr.io/linuxserver/chrome:latest
    container_name: chrome
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - CHROME_CLI=https://www.google.com/ #optional
    volumes:
      - /opt/dockerdir/Chromebrowser:/config
    ports:
      - 8000:3000
      - 8001:3001
    shm_size: "1gb"
    restart: unless-stopped
